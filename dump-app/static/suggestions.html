<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions - writesomething.fun</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
    }
    .back-link {
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { color: #fff; }
    .form-section {
      background: #111;
      border: 1px solid #222;
      padding: 32px;
      margin-bottom: 40px;
    }
    .form-section h2 {
      font-size: 1.2rem;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      color: #fff;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      border-radius: 8px;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }
    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: #555;
      margin-top: 4px;
    }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled {
      background: #333;
      cursor: not-allowed;
    }
    .suggestions-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .suggestions-header h2 {
      font-size: 1.2rem;
    }
    .filter-buttons {
      display: flex;
      gap: 8px;
    }
    .filter-btn {
      background: #111;
      border: 1px solid #333;
      color: #666;
      padding: 8px 16px;
      font-size: 0.85rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #555; color: #fff; }
    .filter-btn.active {
      background: #222;
      border-color: #3b82f6;
      color: #fff;
    }
    .suggestions-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .suggestion-card {
      background: #111;
      border: 1px solid #222;
      padding: 24px;
      border-radius: 12px;
      display: flex;
      gap: 20px;
    }
    .vote-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 50px;
    }
    .vote-count {
      font-size: 1.2rem;
      font-weight: 700;
      color: #888;
    }
    .vote-btn {
      background: #222;
      border: 1px solid #333;
      color: #888;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.2s;
      padding: 0;
    }
    .vote-btn:hover {
      background: #2a2a2a;
      border-color: #3b82f6;
      color: #3b82f6;
    }
    .vote-btn.voted {
      background: #1e3a5f;
      border-color: #3b82f6;
      color: #3b82f6;
    }
    .suggestion-content {
      flex: 1;
    }
    .suggestion-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .suggestion-desc {
      color: #888;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .suggestion-meta {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: #555;
      flex-wrap: wrap;
      align-items: center;
    }
    .suggestion-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-select {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }
    .status-select:hover { border-color: #555; }
    .status-select option { background: #111; }
    .status-badge { display: none; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #111;
      border: 1px solid #333;
      padding: 16px 24px;
      border-radius: 8px;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }
    .toast.success { border-color: #22c55e; }
    .toast.error { border-color: #ef4444; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @media (max-width: 600px) {
      .suggestion-card { flex-direction: column; gap: 16px; }
      .vote-section { flex-direction: row; }
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <a href="/" class="back-link">← Back to writesomething.fun</a>
        <h1>Suggestions</h1>
      </div>
    </header>

    <div class="form-section">
      <h2>Submit a Suggestion</h2>
      <form id="suggestionForm">
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" name="title" placeholder="What's your idea?" maxlength="200" required>
          <div class="char-count"><span id="titleCount">0</span>/200</div>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Tell us more about your suggestion..." maxlength="2000"></textarea>
          <div class="char-count"><span id="descCount">0</span>/2000</div>
        </div>
        <div class="form-group">
          <label for="author">Your Name (optional)</label>
          <input type="text" id="author" name="author" placeholder="Anonymous">
        </div>
        <button type="submit" id="submitBtn">Submit Suggestion</button>
      </form>
    </div>

    <div class="suggestions-header">
      <h2><span id="totalCount">0</span> Suggestions</h2>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="implemented">Implemented</button>
      </div>
    </div>

    <div class="suggestions-list" id="suggestionsList">
      <div class="empty-state">
        <div class="empty-state-icon">💡</div>
        <p>No suggestions yet. Be the first to suggest!</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let allSuggestions = [];
    let currentFilter = 'all';

    const titleInput = document.getElementById('title');
    const descInput = document.getElementById('description');
    const titleCount = document.getElementById('titleCount');
    const descCount = document.getElementById('descCount');

    titleInput.addEventListener('input', () => {
      titleCount.textContent = titleInput.value.length;
    });
    descInput.addEventListener('input', () => {
      descCount.textContent = descInput.value.length;
    });

    document.getElementById('suggestionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const data = {
        title: titleInput.value.trim(),
        description: descInput.value.trim(),
        author: document.getElementById('author').value.trim()
      };

      try {
        const res = await fetch(`${API_BASE}/api/suggestions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error('Failed to submit');

        showToast('Suggestion submitted! 🎉', 'success');
        e.target.reset();
        titleCount.textContent = '0';
        descCount.textContent = '0';
        loadSuggestions();
      } catch (err) {
        showToast('Failed to submit suggestion', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Suggestion';
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderSuggestions();
      });
    });

    async function loadSuggestions() {
      try {
        const res = await fetch(`${API_BASE}/api/suggestions?sort=popular`);
        const data = await res.json();
        allSuggestions = data.suggestions || [];
        document.getElementById('totalCount').textContent = allSuggestions.length;
        renderSuggestions();
      } catch (err) {
        console.error('Failed to load suggestions:', err);
      }
    }

    function renderSuggestions() {
      const list = document.getElementById('suggestionsList');
      let filtered = allSuggestions;

      if (currentFilter !== 'all') {
        filtered = allSuggestions.filter(s => s.status === currentFilter);
      }

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">💡</div>
            <p>No ${currentFilter === 'all' ? '' : currentFilter + ' '}suggestions yet.</p>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(s => `
        <div class="suggestion-card" data-id="${s.id}">
          <div class="vote-section">
            <span class="vote-count">${s.upvotes}</span>
            <button class="vote-btn" onclick="upvote('${s.id}')" title="Upvote">↑</button>
          </div>
          <div class="suggestion-content">
            <div class="suggestion-title">${escapeHtml(s.title)}</div>
            ${s.description ? `<div class="suggestion-desc">${escapeHtml(s.description)}</div>` : ''}
            <div class="suggestion-meta">
              <span>By ${escapeHtml(s.author || 'Anonymous')}</span>
              <span>${s.created_date || ''}</span>
              <select class="status-select" onchange="updateStatus('${s.id}', this.value)">
                <option value="pending" ${s.status === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="implemented" ${s.status === 'implemented' ? 'selected' : ''}>Implemented</option>
                <option value="rejected" ${s.status === 'rejected' ? 'selected' : ''}>Rejected</option>
              </select>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function upvote(id) {
      const btn = document.querySelector(`[data-id="${id}"] .vote-btn`);
      if (btn.classList.contains('voted')) {
        showToast('Already upvoted!', 'error');
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/api/suggestions/${id}/upvote`, { method: 'POST' });
        if (res.status === 400) {
          showToast('Already upvoted!', 'error');
          btn.classList.add('voted');
          return;
        }
        const data = await res.json();
        
        const card = document.querySelector(`[data-id="${id}"]`);
        if (card) {
          card.querySelector('.vote-count').textContent = data.upvotes;
          btn.classList.add('voted');
        }
      } catch (err) {
        showToast('Failed to upvote', 'error');
      }
    }

    async function updateStatus(id, status) {
      try {
        await fetch(`${API_BASE}/api/suggestions/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        showToast(`Marked as ${status} ✓`, 'success');
        loadSuggestions();
      } catch (err) {
        showToast('Failed to update status', 'error');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    loadSuggestions();
  </script>
</body>
</html>
