default_provider = "nvidia"
default_model = "moonshotai/kimi-k2.5"

[autonomy]
level = "full"
workspace_only = false
allowed_commands = []
forbidden_paths = []
allowed_roots = []
max_actions_per_hour = 9999
require_approval_for_medium_risk = false
block_high_risk_commands = false
shell_env_passthrough = []
auto_approve = []
always_ask = []

[security.sandbox]
backend = "none"

[security.resources]
max_memory_mb = 8192
max_cpu_time_seconds = 3600
max_subprocesses = 100

[security.otp]
enabled = false
gated_actions = []

[runtime]
kind = "native"

[runtime.docker]
network = "bridge"

[agent]
max_tool_iterations = 999
max_history_messages = 999

[skills]
open_skills_enabled = true
open_skills_dir = "/home/mandar/open-skills"
allow_scripts = true
prompt_injection_mode = "full"

[channels_config]
cli = true

[channels_config.telegram]
bot_token = "REDACTED_TELEGRAM_BOT_TOKEN"
allowed_users = ["*"]

[memory]
backend = "sqlite"
auto_save = true

[gateway]
port = 42618
host = "127.0.0.1"

[security_ops]
require_approval_for_actions = false

[secrets]
encrypt = false

[http_request]
enabled = true
allow_private_hosts = true

[web_fetch]
enabled = true

[web_search]
enabled = true

[hooks]
enabled = false
