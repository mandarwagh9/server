<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skribbl - Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .room-code { font-size: 0.8rem; color: #555; font-family: monospace; }
    .timer-bar {
      width: 200px;
      height: 8px;
      background: #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: #22c55e;
      transition: width 1s linear, background 0.5s;
      border-radius: 4px;
    }
    .timer-fill.warning { background: #f59e0b; }
    .timer-fill.danger { background: #ef4444; }
    .timer-text {
      font-size: 0.85rem;
      font-weight: 700;
      font-family: 'Fira Code', monospace;
      min-width: 40px;
      text-align: right;
    }
    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .round-info { font-size: 0.75rem; color: #555; }
    .word-display {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      font-family: 'Fira Code', monospace;
      color: #fff;
    }
    .word-display.hidden { color: #333; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .score-btn {
      background: #111;
      border: 1px solid #222;
      color: #666;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
    }
    .score-btn:hover { background: #1a1a1a; color: #fff; }
    .exit-btn {
      background: #111;
      border: 1px solid #222;
      color: #666;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
    }
    .exit-btn:hover { background: #1a1a1a; color: #fff; }

    .game-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .canvas-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      min-width: 0;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: #111;
      border: 1px solid #1a1a1a;
      padding: 8px 12px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .toolbar.hidden { display: none; }
    .color-palette {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .color-btn {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .color-btn.active { border-color: #fff; }
    .size-btn {
      background: #1a1a1a;
      border: 1px solid #222;
      color: #888;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
    }
    .size-btn.active { background: #2a2a2a; color: #fff; border-color: #444; }
    .tool-btn {
      background: #1a1a1a;
      border: 1px solid #222;
      color: #888;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    .tool-btn:hover { background: #222; color: #fff; }
    .tool-btn.active { background: #2a2a2a; color: #fff; border-color: #444; }
    .tool-btn.hint { background: #f59e0b; border-color: #f59e0b; color: #000; }
    .tool-btn.hint:hover { background: #d97706; }
    .tool-btn.skip { background: #ef4444; border-color: #ef4444; color: #fff; }
    .tool-btn.skip:hover { background: #dc2626; }

    .canvas-container {
      flex: 1;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .sidebar {
      width: 280px;
      display: flex;
      flex-direction: column;
      background: #111;
      border-left: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .players-panel {
      padding: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    .panel-title {
      font-size: 0.7rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .mini-player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.8rem;
    }
    .mini-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }
    .mini-dot.drawing { background: #3b82f6; }
    .mini-dot.guessed { background: #22c55e; }
    .mini-name { flex: 1; color: #888; }
    .mini-score { color: #555; font-size: 0.75rem; }
    .mini-player.you .mini-name { color: #fff; font-weight: 600; }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 10px 12px;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.7rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    .chat-msg {
      font-size: 0.8rem;
      color: #666;
      line-height: 1.4;
      padding: 2px 0;
    }
    .chat-msg.guess { color: #888; font-style: italic; }
    .chat-msg.system { color: #444; font-style: italic; text-align: center; }
    .chat-msg.correct { color: #22c55e; font-weight: 600; }
    .chat-msg .nick { font-weight: 600; }
    .chat-input-area {
      border-top: 1px solid #1a1a1a;
      padding: 8px;
    }
    .chat-input-area input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #222;
      color: #fff;
      padding: 10px 12px;
      font-size: 0.85rem;
      border-radius: 8px;
      font-family: inherit;
    }
    .chat-input-area input:focus { outline: none; border-color: #3b82f6; }
    .chat-input-area input:disabled { opacity: 0.5; }
    .chat-input-area.drawer input { opacity: 0.3; cursor: not-allowed; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .overlay.visible { display: flex; }
    .overlay-content {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .overlay-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .overlay-word {
      font-size: 2rem;
      font-weight: 800;
      color: #3b82f6;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      font-family: 'Fira Code', monospace;
    }
    .leaderboard {
      text-align: left;
      margin-bottom: 24px;
    }
    .leader-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .leader-row:last-child { border-bottom: none; }
    .leader-rank { color: #555; font-size: 0.85rem; min-width: 24px; }
    .leader-rank.gold { color: #fbbf24; }
    .leader-rank.silver { color: #9ca3af; }
    .leader-rank.bronze { color: #cd7f32; }
    .leader-name { flex: 1; font-weight: 600; }
    .leader-score { color: #3b82f6; font-weight: 700; }
    .overlay-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .overlay-btn:hover { background: #2563eb; }

    .waiting-overlay {
      text-align: center;
    }
    .waiting-overlay h2 { font-size: 1.5rem; margin-bottom: 16px; }
    .waiting-overlay p { color: #666; margin-bottom: 8px; }

    @media (max-width: 700px) {
      .game-area { flex-direction: column; }
      .sidebar { width: 100%; max-height: 250px; }
      .toolbar { justify-content: center; }
      .header { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="room-code" id="roomCode"></div>
      <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
      <div class="timer-text" id="timerText">80</div>
    </div>
    <div class="header-center">
      <div class="round-info" id="roundInfo">round 1/3</div>
      <div class="word-display hidden" id="wordDisplay">_ _ _ _ _</div>
    </div>
    <div class="header-right">
      <button class="score-btn" onclick="showScoreboard()">scores</button>
      <button class="exit-btn" onclick="leaveGame()">exit</button>
    </div>
  </div>

  <div class="game-area">
    <div class="canvas-wrapper">
      <div class="toolbar hidden" id="toolbar">
        <div class="color-palette" id="colorPalette"></div>
        <div style="width:1px;height:20px;background:#222;margin:0 4px;"></div>
        <button class="size-btn active" data-size="4" onclick="setBrushSize(4)">S</button>
        <button class="size-btn" data-size="8" onclick="setBrushSize(8)">M</button>
        <button class="size-btn" data-size="16" onclick="setBrushSize(16)">L</button>
        <div style="width:1px;height:20px;background:#222;margin:0 4px;"></div>
        <button class="tool-btn" id="eraserBtn" onclick="toggleEraser()">eraser</button>
        <button class="tool-btn" onclick="clearCanvas()">clear</button>
        <button class="tool-btn" onclick="undoStroke()">undo</button>
        <button class="tool-btn hint" id="hintBtn" onclick="requestHint()">hint</button>
        <button class="tool-btn skip" id="skipBtn" onclick="skipWord()">skip</button>
      </div>
      <div class="canvas-container">
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <div class="sidebar">
      <div class="players-panel">
        <div class="panel-title">players</div>
        <div id="playerList"></div>
      </div>
      <div class="chat-panel">
        <div class="chat-header">chat</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area" id="chatInputArea">
          <input type="text" id="chatInput" placeholder="type your guess..." maxlength="100" onkeydown="if(event.key==='Enter')sendGuess()">
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-content" id="overlayContent"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const code = new URLSearchParams(window.location.search).get('code');
    const myId = socket.id;

    if (!code) { window.location.href = '/index.html'; }

    document.getElementById('roomCode').textContent = code;

    // --- Canvas Setup ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let currentColor = '#000000';
    let currentSize = 4;
    let isEraser = false;
    let strokes = [];
    let currentStroke = [];

    const COLORS = [
      '#000000','#ffffff','#ef4444','#f97316','#eab308',
      '#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899',
      '#78716c','#a1a1aa','#064e3b','#7c2d12','#1e1b4b',
    ];

    function resizeCanvas() {
      const container = canvas.parentElement;
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      redrawCanvas();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Color palette
    const palette = document.getElementById('colorPalette');
    COLORS.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'color-btn' + (c === '#000000' ? ' active' : '');
      btn.style.background = c;
      btn.onclick = () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentColor = c;
        isEraser = false;
        document.getElementById('eraserBtn').classList.remove('active');
      };
      palette.appendChild(btn);
    });

    function setBrushSize(size) {
      currentSize = size;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.size-btn[data-size="${size}"]`).classList.add('active');
    }

    function toggleEraser() {
      isEraser = !isEraser;
      const btn = document.getElementById('eraserBtn');
      btn.classList.toggle('active', isEraser);
      if (isEraser) {
        currentColor = '#ffffff';
      } else {
        currentColor = '#000000';
      }
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', endDraw);

    function startDraw(e) {
      if (!isDrawer) return;
      isDrawing = true;
      const pos = getPos(e);
      lastX = pos.x;
      lastY = pos.y;
      currentStroke = [{ x: pos.x, y: pos.y }];

      socket.emit('draw-event', {
        type: 'start',
        x: pos.x, y: pos.y,
        color: isEraser ? '#ffffff' : currentColor,
        size: isEraser ? currentSize * 3 : currentSize
      });
    }

    function draw(e) {
      if (!isDrawing || !isDrawer) return;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = isEraser ? '#ffffff' : currentColor;
      ctx.lineWidth = isEraser ? currentSize * 3 : currentSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();

      socket.emit('draw-event', {
        type: 'draw',
        x1: lastX, y1: lastY,
        x2: pos.x, y2: pos.y,
        color: isEraser ? '#ffffff' : currentColor,
        size: isEraser ? currentSize * 3 : currentSize
      });

      currentStroke.push({ x: pos.x, y: pos.y, ex: pos.x, ey: pos.y });
      lastX = pos.x;
      lastY = pos.y;
    }

    function endDraw() {
      if (!isDrawing) return;
      isDrawing = false;
      if (currentStroke.length > 0) {
        strokes.push(currentStroke);
        currentStroke = [];
      }
    }

    function clearCanvas() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      strokes = [];
      socket.emit('draw-sync', { type: 'clear' });
    }

    function undoStroke() {
      if (!isDrawer || strokes.length === 0) return;
      strokes.pop();
      redrawCanvas();
      socket.emit('draw-sync', { type: 'undo', strokes });
    }

    function redrawCanvas() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      strokes.forEach(stroke => {
        if (stroke.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(stroke[0].x, stroke[0].y);
        for (let i = 1; i < stroke.length; i++) {
          ctx.lineTo(stroke[i].x, stroke[i].y);
        }
        ctx.strokeStyle = stroke[0].color || '#000000';
        ctx.lineWidth = stroke[0].size || 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      });
    }

    // --- Socket Events ---
    let isDrawer = false;
    let myNickname = sessionStorage.getItem('nickname') || 'Anonymous';
    let players = [];
    let gameState = 'waiting';
    let currentWord = null;

    socket.on('your-word', ({ word }) => {
      currentWord = word;
      isDrawer = true;
      document.getElementById('toolbar').classList.remove('hidden');
      document.getElementById('chatInputArea').classList.add('drawer');
      document.getElementById('chatInput').disabled = true;
      document.getElementById('wordDisplay').textContent = word;
      document.getElementById('wordDisplay').classList.remove('hidden');
      addSystemMessage('your word: ' + word);
    });

    socket.on('round-start', (data) => {
      gameState = 'playing';
      currentWord = null;
      isDrawer = data.drawerId === socket.id;
      strokes = [];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      document.getElementById('toolbar').classList.add('hidden');
      document.getElementById('chatInput').disabled = false;
      document.getElementById('chatInputArea').classList.remove('drawer');

      document.getElementById('wordDisplay').classList.add('hidden');
      document.getElementById('roundInfo').textContent = `round ${data.round}/${data.totalRounds}`;

      if (!isDrawer) {
        document.getElementById('wordDisplay').textContent = data.wordDisplay;
        document.getElementById('wordDisplay').classList.remove('hidden');
      } else {
        document.getElementById('wordDisplay').textContent = '?????';
        document.getElementById('wordDisplay').classList.remove('hidden');
      }

      document.getElementById('overlay').classList.remove('visible');
      renderPlayers(data.players || players);
      updateTimer(data.timeLeft);
    });

    socket.on('timer', ({ timeLeft }) => {
      updateTimer(timeLeft);
    });

    function updateTimer(timeLeft) {
      const fill = document.getElementById('timerFill');
      const text = document.getElementById('timerText');
      const pct = (timeLeft / 80) * 100;
      fill.style.width = pct + '%';
      text.textContent = timeLeft;
      fill.className = 'timer-fill';
      if (timeLeft <= 10) fill.className += ' danger';
      else if (timeLeft <= 30) fill.className += ' warning';
    }

    socket.on('draw-event', (data) => {
      ctx.beginPath();
      ctx.moveTo(data.x1 || data.x, data.y1 || data.y);
      ctx.lineTo(data.x2 || data.x, data.y2 || data.y);
      ctx.strokeStyle = data.color;
      ctx.lineWidth = data.size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    });

    socket.on('draw-sync', (data) => {
      if (data.type === 'clear') {
        strokes = [];
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else if (data.type === 'undo') {
        strokes = data.strokes || [];
        redrawCanvas();
      }
    });

    socket.on('clear-canvas', () => {
      strokes = [];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });

    socket.on('guess-result', ({ players: p }) => {
      renderPlayers(p);
    });

    socket.on('chat-message', ({ nickname, text, isGuess }) => {
      addMessage(nickname, text, isGuess ? 'guess' : '');
    });

    socket.on('correct-guess', ({ nickname, points, players: p }) => {
      addMessage(nickname, `guessed correctly! +${points}`, 'correct');
      renderPlayers(p);
    });

    socket.on('close-guess', () => {
      addMessage('system', 'someone is close!', 'system');
    });

    socket.on('player-list', ({ players: p }) => {
      renderPlayers(p);
    });

    socket.on('round-end', ({ word, players: p }) => {
      gameState = 'roundEnd';
      currentWord = word;
      isDrawer = false;
      document.getElementById('overlayContent').innerHTML = `
        <div class="overlay-title">time's up!</div>
        <div class="overlay-word">${word}</div>
        <div class="leaderboard">
          ${(p || players).sort((a,b) => b.score - a.score).map((pl, i) => `
            <div class="leader-row">
              <div class="leader-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">#${i+1}</div>
              <div class="leader-name">${escapeHtml(pl.nickname)}</div>
              <div class="leader-score">${pl.score}</div>
            </div>
          `).join('')}
        </div>
        <button class="overlay-btn" onclick="hideOverlay()">ok</button>
      `;
      document.getElementById('overlay').classList.add('visible');
      if (p) renderPlayers(p);
    });

    socket.on('game-end', ({ leaderboard }) => {
      gameState = 'end';
      document.getElementById('overlayContent').innerHTML = `
        <div class="overlay-title">game over!</div>
        <div class="leaderboard">
          ${leaderboard.map((pl, i) => `
            <div class="leader-row">
              <div class="leader-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">#${i+1}</div>
              <div class="leader-name">${escapeHtml(pl.nickname)}</div>
              <div class="leader-score">${pl.score}</div>
            </div>
          `).join('')}
        </div>
        <button class="overlay-btn" onclick="leaveGame()">back to lobby</button>
      `;
      document.getElementById('overlay').classList.add('visible');
    });

    socket.on('back-to-lobby', ({ players: p }) => {
      window.location.href = `/lobby.html?code=${code}`;
    });

    socket.on('hint-update', ({ wordDisplay }) => {
      document.getElementById('wordDisplay').textContent = wordDisplay;
    });

    socket.on('drawer-left', () => {
      addSystemMessage('drawer left the game');
    });

    function renderPlayers(list) {
      players = list;
      const el = document.getElementById('playerList');
      el.innerHTML = list.map(p => {
        const isDrawing = p.id === socket.id && isDrawer;
        return `
          <div class="mini-player${p.id === socket.id ? ' you' : ''}">
            <div class="mini-dot${isDrawing ? ' drawing' : ''}"></div>
            <div class="mini-name">${escapeHtml(p.nickname)}</div>
            <div class="mini-score">${p.score}</div>
          </div>
        `;
      }).join('');
    }

    function sendGuess() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || isDrawer) return;
      socket.emit('guess', { text });
      input.value = '';
    }

    function showScoreboard() {
      const overlay = document.getElementById('overlay');
      const content = document.getElementById('overlayContent');
      content.innerHTML = `
        <div class="overlay-title">scores</div>
        <div class="leaderboard">
          ${players.sort((a,b) => b.score - a.score).map((p, i) => `
            <div class="leader-row">
              <div class="leader-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">#${i+1}</div>
              <div class="leader-name">${escapeHtml(p.nickname)}</div>
              <div class="leader-score">${p.score}</div>
            </div>
          `).join('')}
        </div>
        <button class="overlay-btn" onclick="hideOverlay()">close</button>
      `;
      overlay.classList.add('visible');
    }

    function hideOverlay() {
      document.getElementById('overlay').classList.remove('visible');
    }

    function requestHint() {
      socket.emit('hint');
    }

    function skipWord() {
      socket.emit('skip-word');
    }

    function leaveGame() {
      window.location.href = `/lobby.html?code=${code}`;
    }

    function addMessage(nick, text, type) {
      const el = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'chat-msg ' + type;
      div.innerHTML = `<span class="nick">${escapeHtml(nick)}</span>: ${escapeHtml(text)}`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function addSystemMessage(text) {
      const el = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'chat-msg system';
      div.textContent = text;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // --- Join room ---
    socket.emit('join-room', { code, nickname: myNickname });

    socket.on('room-joined', () => {
      // joined successfully
    });

    socket.on('error', ({ message }) => {
      alert(message);
      window.location.href = '/index.html';
    });

    // White canvas on load
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
