<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby - Skribbl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-code { font-size: 1.4rem; font-weight: 700; font-family: monospace; letter-spacing: 0.2em; color: #3b82f6; }
    .leave-btn {
      background: #111; border: 1px solid #222; color: #666;
      padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-family: inherit;
    }
    .leave-btn:hover { background: #1a1a1a; color: #fff; }

    .main { flex: 1; display: flex; gap: 20px; padding: 20px; max-width: 860px; margin: 0 auto; width: 100%; }
    .players-section { flex: 1; }
    .section-title { font-size: 0.75rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .player-list { background: #111; border: 1px solid #1a1a1a; border-radius: 10px; padding: 6px; min-height: 180px; }
    .player { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 6px; }
    .player.host { background: #1a1a2e; border: 1px solid #2a2a4e; }
    .player-icon { width: 32px; height: 32px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
    .player-name { font-weight: 600; font-size: 0.9rem; }
    .player-badge { font-size: 0.6rem; background: #3b82f6; color: #fff; padding: 2px 7px; border-radius: 10px; margin-left: 5px; }
    .player-count { color: #444; font-size: 0.75rem; margin-top: 6px; text-align: center; }
    .footer { padding: 20px; display: flex; justify-content: center; }
    .start-btn {
      background: #22c55e; color: #fff; border: none;
      padding: 14px 44px; font-size: 1rem; font-weight: 700; border-radius: 10px;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .start-btn:hover { background: #16a34a; }
    .start-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; border: 1px solid #222; }
    .waiting-text { text-align: center; padding: 40px; color: #444; font-size: 0.88rem; }
    .error-msg { text-align: center; color: #ef4444; font-size: 0.82rem; margin-top: 10px; display: none; }

    .chat-section { width: 280px; display: flex; flex-direction: column; background: #111; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; }
    .chat-header { padding: 10px 14px; border-bottom: 1px solid #1a1a1a; font-size: 0.7rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em; }
    .chat-messages { flex: 1; padding: 10px; overflow-y: auto; min-height: 180px; max-height: 280px; display: flex; flex-direction: column; gap: 3px; }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    .chat-msg { font-size: 0.82rem; color: #888; line-height: 1.4; }
    .chat-msg .nick { color: #3b82f6; font-weight: 600; }
    .chat-input-area { border-top: 1px solid #1a1a1a; padding: 8px; }
    .chat-input-area input {
      width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff;
      padding: 9px 12px; font-size: 0.82rem; border-radius: 6px; font-family: inherit;
    }
    .chat-input-area input:focus { outline: none; border-color: #3b82f6; }

    @media (max-width: 680px) { .main { flex-direction: column; } .chat-section { width: 100%; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="room-code" id="roomCode">----</div>
    <button class="leave-btn" onclick="leaveRoom()">leave</button>
  </div>

  <div class="main">
    <div class="players-section">
      <div class="section-title">players</div>
      <div class="player-list" id="playerList">
        <div class="waiting-text">connecting...</div>
      </div>
      <div class="player-count" id="playerCount"></div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <div class="chat-section">
      <div class="chat-header">chat</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="say something..." maxlength="200" onkeydown="if(event.key==='Enter')sendChat()">
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="start-btn" id="startBtn" disabled>connecting...</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const code = new URLSearchParams(window.location.search).get('code');
    const nickname = sessionStorage.getItem('nickname') || 'Anonymous';
    let isHost = false;
    let players = [];
    let gameStarted = false;

    if (!code || !nickname) { window.location.href = '/index.html'; }
    document.getElementById('roomCode').textContent = code;

    socket.on('connect', () => {
      socket.emit('join-room', { code, nickname });
    });

    socket.on('room-created', (data) => {
      isHost = true;
      updateStartButton();
      document.getElementById('playerList').innerHTML = '<div class="waiting-text">waiting for players...</div>';
    });

    socket.on('room-joined', (data) => {
      isHost = data.isHost;
      players = data.players || [];
      renderPlayers(players);
      updateStartButton();

      if (data.gameState === 'playing') {
        window.location.href = `/game.html?code=${code}`;
      }
    });

    socket.on('player-list', ({ players: p }) => {
      players = p || [];
      renderPlayers(players);
      updateStartButton();
    });

    socket.on('you-are-host', () => {
      isHost = true;
      updateStartButton();
      renderPlayers(players);
    });

    socket.on('new-host', () => {
      updateStartButton();
      renderPlayers(players);
    });

    socket.on('game-start', (data) => {
      gameStarted = true;
      window.location.href = `/game.html?code=${code}`;
    });

    socket.on('chat-message', ({ nickname: nick, text }) => {
      const el = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = `<span class="nick">${escapeHtml(nick)}</span>: ${escapeHtml(text)}`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    });

    socket.on('error', ({ message }) => {
      const el = document.getElementById('errorMsg');
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    });

    socket.on('disconnect', () => {
      if (!gameStarted) {
        const el = document.getElementById('errorMsg');
        el.textContent = 'Disconnected. Trying to reconnect...';
        el.style.display = 'block';
      }
    });

    function renderPlayers(list) {
      const el = document.getElementById('playerList');
      const icons = ['bear', 'cat', 'dog', 'fox', 'owl', 'panda', 'rabbit', 'wolf'];
      if (list.length === 0) {
        el.innerHTML = '<div class="waiting-text">waiting for players...</div>';
        return;
      }
      el.innerHTML = list.map((p, i) => `
        <div class="player${p.isHost ? ' host' : ''}">
          <div class="player-icon">${icons[i % icons.length]}</div>
          <div class="player-name">${escapeHtml(p.nickname)}${p.isHost ? '<span class="player-badge">host</span>' : ''}</div>
        </div>
      `).join('');
      document.getElementById('playerCount').textContent = `${list.length} / ${12} players`;
    }

    function updateStartButton() {
      const btn = document.getElementById('startBtn');
      if (!isHost) {
        btn.disabled = true;
        btn.textContent = players.length < 2 ? 'need 2+ players...' : 'waiting for host...';
      } else if (players.length < 2) {
        btn.disabled = true;
        btn.textContent = 'need 2+ players';
      } else {
        btn.disabled = false;
        btn.textContent = 'start game';
      }
    }

    function startGame() {
      socket.emit('start-game');
    }

    function leaveRoom() {
      sessionStorage.removeItem('roomCode');
      window.location.href = '/index.html';
    }

    function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      socket.emit('chat-message', { text });
      input.value = '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
